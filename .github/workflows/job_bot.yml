name: Daily Job Scraper

on:
  schedule:
    # ירוץ כל יום ב-10:00 בבוקר שעון ישראל (07:00 UTC)
    - cron: '0 7 * * *'
    # ירוץ כל יום ב-18:00 בערב שעון ישראל (15:00 UTC)
    - cron: '0 15 * * *'
  workflow_dispatch: # מאפשר להריץ ידנית בלחיצת כפתור

jobs:
  run-bot:
    runs-on: ubuntu-latest

    # הוספת הרשאות כתיבה כדי שהבוט יוכל לעדכן את קובץ ה-JSON ב-Repository
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run Job Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py


      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # מוודא שהקובץ קיים במעקב של גיט
          git add sent_jobs.json || echo "No changes to add"
          
          # בודק אם באמת יש מה לעשות Commit (כדי למנוע שגיאות סתם)
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update sent jobs database [skip ci]"
            # משתמש ב-rebase כדי "להדביק" את השינוי של הבוט מעל השינויים שלך
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes to commit, everything is up to date."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}