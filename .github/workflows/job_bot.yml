name: Daily Job Scraper

on:
  schedule:
    # ירוץ כל יום ב-07:00 UTC (שזה 10:00 בבוקר שעון ישראל)
    - cron: '0 7 * * *'
  workflow_dispatch: # מאפשר להריץ ידנית בלחיצת כפתור

jobs:
  run-bot:
    runs-on: ubuntu-latest

    # הוספת הרשאות כתיבה כדי שהבוט יוכל לעדכן את קובץ ה-JSON ב-Repository
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run Job Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      # השלב שזוכר: מעדכן את הקובץ sent_jobs.json ושומר אותו בגיטהאב למחר
      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # אם הקובץ לא קיים עדיין (ריצה ראשונה), הפקודה לא תיכשל
          git add sent_jobs.json || echo "No changes to add"
          # ביצוע Commit רק אם יש שינויים (משרות חדשות)
          git commit -m "Update sent jobs database [skip ci]" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}